<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | WrongEsports</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/index.html" class="nav-logo">Wrong<span>Esports</span></a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">&#9776;</button>
    <div class="nav-links" id="navLinks">
      <a href="/index.html">Home</a>
      <a href="/tournaments.html">Tournaments</a>
      <a href="/leaderboard.html">Leaderboard</a>
      <a href="/teams.html">Teams</a>
      <a href="/media.html">Media</a>
      <a href="/help.html">Help</a>
    </div>
    <div class="nav-auth" id="navAuth"></div>
  </nav>

  <main>
    <section class="section">
      <div class="page-shell dashboard-layout">
        <aside class="dashboard-sidebar">
          <div class="dashboard-nav">
            <button class="btn-secondary dashboard-tab active" data-tab="profile">Profile</button>
            <button class="btn-secondary dashboard-tab" data-tab="tournaments">My Tournaments</button>
            <button class="btn-secondary dashboard-tab" data-tab="history">Match History</button>
            <button class="btn-secondary dashboard-tab" data-tab="change">Change Request</button>
          </div>
        </aside>
        <section class="dashboard-content stack">
          <section class="section-topbar card">
            <div>
              <p class="section-topbar-kicker">Player space</p>
              <h1 class="section-title" id="dashboardGreeting">Dashboard</h1>
            </div>
            <div class="section-topbar-meta">
              <div class="identity-chip" id="dashboardIdentityChip">
                <span class="identity-chip-mark">P</span>
                <div>
                  <strong id="dashboardUserName">Player</strong>
                  <p>Profile control</p>
                </div>
              </div>
            </div>
          </section>
          <div class="dashboard-panel active" data-tab="profile" id="profilePanel"></div>
          <div class="dashboard-panel" data-tab="tournaments" id="myTournamentsPanel"></div>
          <div class="dashboard-panel" data-tab="history" id="matchHistoryPanel"></div>
          <div class="dashboard-panel" data-tab="change" id="changeRequestPanel"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/home.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
