<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | WrongEsports</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">Wrong<span>Esports</span></a>
    <button class="nav-toggle" id="navToggle">?</button>
    <div class="nav-links" id="navLinks">
      <a href="/">Home</a>
      <a href="/tournaments">Tournaments</a>
      <a href="/leaderboard">Leaderboard</a>
      <a href="/teams">Teams</a>
      <a href="/media">Media</a>
      <a href="/help">Help</a>
    </div>
    <div class="nav-auth" id="navAuth"></div>
  </nav>

  <main class="auth-shell">
    <section class="form-card">
      <div class="auth-logo nav-logo">Wrong<span>Esports</span></div>
      <h1 class="section-title" style="text-align:center;">JOIN WRONGESPORTS</h1>
      <form id="registerForm" class="stack" novalidate>
        <div class="field"><label for="playerName">Player Name</label><input id="playerName" name="playerName" required><span class="field-error" data-error-for="playerName"></span></div>
        <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required><span class="field-error" data-error-for="email"></span></div>
        <div class="field"><label for="password">Password</label><input id="password" name="password" type="password" minlength="8" required><span class="field-error" data-error-for="password"></span></div>
        <div class="field"><label for="confirmPassword">Confirm Password</label><input id="confirmPassword" name="confirmPassword" type="password" required><span class="field-error" data-error-for="confirmPassword"></span></div>
        <div class="field"><label for="ffuid">Free Fire UID</label><input id="ffuid" name="ffuid" pattern="[0-9]+" required><span class="field-error" data-error-for="ffuid"></span></div>
        <div class="field"><label for="inGameName">In-Game Name</label><input id="inGameName" name="inGameName" required><span class="field-error" data-error-for="inGameName"></span></div>
        <div class="field"><label for="teamName">Team Name</label><input id="teamName" name="teamName" required><span class="field-error" data-error-for="teamName"></span></div>
        <div class="field"><label for="discordId">Discord ID</label><input id="discordId" name="discordId" placeholder="username#0000" required><span class="field-error" data-error-for="discordId"></span></div>
        <button type="submit" class="btn-primary">CREATE ACCOUNT</button>
        <p id="registerMessage" class="field-error"></p>
      </form>
      <div id="registerSuccess" class="stack hidden">
        <div class="notice-card">Account created! You can now login.</div>
        <a href="/login" class="btn-primary" style="text-align:center;">Go to Login</a>
      </div>
      <p style="text-align:center; margin-top:1rem;">Already have an account? <a href="/login" style="color:var(--primary);">Login</a></p>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth-pages.js"></script>
</body>
</html>
