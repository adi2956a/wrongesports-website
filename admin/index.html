<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Access | WrongEsports</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="form-card" style="max-width:360px;">
      <h1 class="section-title" style="text-align:center; color:var(--primary);">ADMIN ACCESS</h1>
      <form id="adminLoginForm" class="stack" style="margin-top:1.5rem;">
        <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required></div>
        <div class="field"><label for="password">Password</label><input id="password" name="password" type="password" required></div>
        <button type="submit" class="btn-primary">LOGIN AS ADMIN</button>
        <p id="adminLoginMessage" class="field-error"></p>
      </form>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/home.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
